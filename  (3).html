<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matyko | Content Creator</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif}

body{
min-height:100vh;
color:white;
overflow-x:hidden;
background: radial-gradient(circle at 10% 20%, #7c3aed, transparent 30%),
            radial-gradient(circle at 80% 60%, #9333ea, transparent 30%),
            radial-gradient(circle at 50% 90%, #4c1d95, transparent 40%),
            #020617;
}

/* Galaxy Stars */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background-image:radial-gradient(white 1px, transparent 1px);
background-size:50px 50px;
animation:stars 120s linear infinite;
opacity:.5;
z-index:-1;
}

@keyframes stars{
from{transform:translateY(0)}
to{transform:translateY(-2000px)}
}

.navbar{
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,.4);
backdrop-filter:blur(20px);
border-bottom:1px solid rgba(255,255,255,.1);
}

.logo{
font-family:'Orbitron';
font-size:1.5rem;
color:#c084fc;
}

.nav-links a{
margin-left:20px;
text-decoration:none;
color:white;
}

.container{max-width:1100px;margin:auto;padding:40px 20px}

.hero{
text-align:center;
padding:60px;
background:rgba(0,0,0,.4);
border-radius:20px;
backdrop-filter:blur(20px);
box-shadow:0 0 40px rgba(147,51,234,.3);
}

h1{
font-family:'Orbitron';
font-size:3.5rem;
background:linear-gradient(90deg,#c084fc,#a855f7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.buttons{margin-top:20px}

.btn{
padding:14px 25px;
border-radius:12px;
text-decoration:none;
margin:5px;
display:inline-block;
transition:.25s;
}

.btn:hover{transform:translateY(-5px);box-shadow:0 0 20px #a855f7}

.discord{background:#5865F2}
.youtube{background:#ff0000}
.tiktok{background:#000}

.section{
margin-top:50px;
padding:30px;
background:rgba(0,0,0,.4);
border-radius:20px;
backdrop-filter:blur(20px);
}

iframe{width:100%;border-radius:15px}

.progress{
width:100%;
height:20px;
background:#111;
border-radius:20px;
margin-top:15px;
overflow:hidden;
}

.bar{
height:100%;
background:linear-gradient(90deg,#9333ea,#c084fc);
width:0%;
}

footer{text-align:center;margin-top:40px;opacity:.6}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">Matyko</div>
<div class="nav-links">
<a href="#">Home</a>
<a href="#video">Videók</a>
<a href="#subs">Subs</a>
</div>
</div>

<div class="container">

<div class="hero">
<h1>Matyko</h1>
<p>🎮 Content Creator & Streamer</p>

<div class="buttons">
<a href="https://discord.gg/4X6tTksm" target="_blank" class="btn discord">Discord</a>
<a href="https://www.youtube.com/@Matyko274" target="_blank" class="btn youtube">YouTube</a>
<a href="https://www.tiktok.com/@matyko512" target="_blank" class="btn tiktok">TikTok</a>
</div>

</div>

<div class="section" id="video">
<h2>🎬 Legújabb Videóm</h2>
<iframe height="400" src="https://www.youtube.com/embed?listType=user_uploads&list=Matyko274"></iframe>
</div>

<div class="section">
<h2>🔴 Live Stream</h2>
<iframe height="400" src="https://www.youtube.com/embed/live_stream?channel=Matyko274"></iframe>
</div>

<div class="section" id="subs">
<h2>📊 Live Subscriber Counter</h2>

<iframe height="80" width="300" frameborder="0" 
src="https://livecounts.io/embed/youtube-live-subscriber-counter/Matyko274">
</iframe>

<h3>🎯 Cél: 500</h3>
<div class="progress">
<div class="bar" id="bar"></div>
</div>
</div>

<footer>
© 2026 Matyko
</footer>

</div>

<script>
let goal = 500;
let subs = 0;
let percent = (subs/goal)*100;
document.getElementById("bar").style.width = percent+"%";
</script>

</body>
</html>
